apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: connectk

resources:
  - namespace.yaml
  - secrets.yaml
  - ingress.yaml
  # Backend
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/configmap.yaml
  - backend/hpa.yaml
  # Frontend
  - frontend/deployment.yaml
  - frontend/service.yaml
  - frontend/configmap.yaml
  - frontend/hpa.yaml
