apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: connectk
data:
  CONNECTK_ENV: "production"
  LOG_LEVEL: "INFO"

  # Session
  SESSION_TIMEOUT_MINUTES: "30"
  SESSION_MAX_AGE_HOURS: "8"
  MAX_CONCURRENT_SESSIONS: "5"

  # Cache
  CACHE_DEFAULT_TTL_SECONDS: "300"

  # SSE
  SSE_HEARTBEAT_SECONDS: "15"

  # KubeAPI
  KUBEAPI_TIMEOUT_SECONDS: "10"

  # Audit
  AUDIT_RETENTION_DAYS: "90"

  # Feature flags
  ENABLE_SSE_LIVE_UPDATES: "true"
  ENABLE_COST_ESTIMATION: "false"
  ENABLE_CUSTOM_GROUPS: "false"
  MAX_CLUSTERS_PER_USER: "50"

  # GitOps
  GITOPS_DRY_RUN: "false"
  GIT_REPO_BASE_URL: "https://github.com/MahammadRafi06"

  # CORS — override per environment
  ALLOWED_ORIGINS: "https://connectk.yourdomain.com"

  # OIDC — non-secret fields
  OIDC_REDIRECT_URI: "https://connectk.yourdomain.com/api/auth/callback"
