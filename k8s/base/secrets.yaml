apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: connectk
type: Opaque
stringData:
  # ---- Database (overridden by self-hosted or managed component) ----
  DATABASE_URL: "REPLACE_ME"
  DATABASE_SYNC_URL: "REPLACE_ME"

  # ---- Redis (overridden by self-hosted or managed component) ----
  REDIS_URL: "REPLACE_ME"

  # ---- Azure Entra ID ----
  AZURE_TENANT_ID: "REPLACE_ME"
  AZURE_CLIENT_ID: "REPLACE_ME"
  AZURE_CLIENT_SECRET: "REPLACE_ME"
  INITIAL_ADMIN_ENTRA_GROUP_ID: "REPLACE_ME"
  ADMIN_GROUP_IDS: "REPLACE_ME"

  # ---- Session encryption (generate with: openssl rand -hex 32) ----
  SESSION_SECRET_KEY: "REPLACE_ME"
  CSRF_SECRET_KEY: "REPLACE_ME"

  # ---- GitOps SSH key (base64-encoded private key) ----
  GIT_SSH_PRIVATE_KEY: "REPLACE_ME"

  # ---- ArgoCD ----
  ARGOCD_SERVER_URL: "REPLACE_ME"
