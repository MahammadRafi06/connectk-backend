apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# No resources deployed — Redis is a managed service (ElastiCache / Memorystore / Azure Cache).
# This component only patches backend-secrets to point at the external endpoint.

patches:
  - target:
      kind: Secret
      name: backend-secrets
    patch: |-
      - op: replace
        path: /stringData/REDIS_URL
        value: "redis://MANAGED_REDIS_HOST:6379/0"
