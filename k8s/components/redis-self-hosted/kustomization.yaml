apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - statefulset.yaml
  - service.yaml

# Patch backend-secrets to point REDIS_URL at the in-cluster Redis Service
patches:
  - target:
      kind: Secret
      name: backend-secrets
    patch: |-
      - op: replace
        path: /stringData/REDIS_URL
        value: "redis://redis:6379/0"
