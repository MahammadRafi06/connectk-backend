apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: connectk
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: connectk
spec:
  type: ClusterIP
  clusterIP: None  # Headless for StatefulSet stable DNS
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
