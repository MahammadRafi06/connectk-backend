apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - statefulset.yaml
  - service.yaml
  - secret.yaml

# Patch backend-secrets to point DATABASE_URL at the in-cluster Postgres Service
patches:
  - target:
      kind: Secret
      name: backend-secrets
    patch: |-
      - op: replace
        path: /stringData/DATABASE_URL
        value: "postgresql+asyncpg://connectk:0VVobfid5Ba6YFiORpjSmtGc2IOF1a3@postgres:5432/connectk"
      - op: replace
        path: /stringData/DATABASE_SYNC_URL
        value: "postgresql://connectk:0VVobfid5Ba6YFiORpjSmtGc2IOF1a3@postgres:5432/connectk"
