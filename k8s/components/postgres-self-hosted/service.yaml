apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: connectk
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: connectk
spec:
  type: ClusterIP
  clusterIP: None  # Headless for StatefulSet stable DNS
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
