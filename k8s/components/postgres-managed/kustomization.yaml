apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# No resources deployed — the database is a managed service (RDS / CloudSQL / Azure DB).
# This component only patches backend-secrets to point at the external endpoint.

patches:
  - target:
      kind: Secret
      name: backend-secrets
    patch: |-
      - op: replace
        path: /stringData/DATABASE_URL
        value: "postgresql+asyncpg://MANAGED_USER:MANAGED_PASSWORD@MANAGED_HOST:5432/connectk"
      - op: replace
        path: /stringData/DATABASE_SYNC_URL
        value: "postgresql://MANAGED_USER:MANAGED_PASSWORD@MANAGED_HOST:5432/connectk"
