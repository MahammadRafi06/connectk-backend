# ServiceAccount for the EBS CSI Driver using IRSA (IAM Roles for Service Accounts).
# This is only needed if you install the CSI driver manually via Helm.
# If you use the EKS managed add-on (recommended), skip this file and instead:
#
#   1. Create an IAM role with the AmazonEBSCSIDriverPolicy
#   2. Install the add-on:
#      eksctl create addon --name aws-ebs-csi-driver --cluster YOUR_CLUSTER \
#        --service-account-role-arn arn:aws:iam::ACCOUNT_ID:role/AmazonEKS_EBS_CSI_DriverRole
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebs-csi-controller-sa
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: connectk
  annotations:
    # Replace with your IAM role ARN that has AmazonEBSCSIDriverPolicy attached
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/AmazonEKS_EBS_CSI_DriverRole"
