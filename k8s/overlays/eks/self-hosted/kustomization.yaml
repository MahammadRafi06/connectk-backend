apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# EKS + self-hosted Postgres & Redis
# Deploy: kubectl apply -k k8s/overlays/eks/self-hosted/
#
# Prerequisites:
#   - EBS CSI Driver add-on installed (see ebs-csi-driver-sa.yaml comments)

resources:
- ../../../base
- storageclass.yaml

components:
- ../../../components/postgres-self-hosted
- ../../../components/redis-self-hosted

images:
- name: BACKEND_IMAGE
  newName: ghcr.io/mahammadrafi06/connectk-backend
  newTag: sha-c7b3057
- name: FRONTEND_IMAGE
  newName: ghcr.io/mahammadrafi06/connectk-frontend
  newTag: sha-8155278
