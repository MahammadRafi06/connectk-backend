apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# EKS + self-hosted Postgres & Redis
# Deploy: kubectl apply -k k8s/overlays/eks/self-hosted/
#
# Prerequisites:
#   - EBS CSI Driver add-on installed (see ebs-csi-driver-sa.yaml comments)

resources:
  - ../../../base
  - ../storageclass.yaml
  # Uncomment if installing CSI driver manually (not needed with EKS managed add-on):
  # - ../ebs-csi-driver-sa.yaml

components:
  - ../../../components/postgres-self-hosted
  - ../../../components/redis-self-hosted

images:
  - name: BACKEND_IMAGE
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/connectk-backend
    newTag: latest
  - name: FRONTEND_IMAGE
    newName: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/connectk-frontend
    newTag: latest
