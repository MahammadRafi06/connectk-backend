apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# AKS + self-hosted Postgres & Redis
# Deploy: kubectl apply -k k8s/overlays/aks/self-hosted/

resources:
  - ../../../base
  - ../storageclass.yaml

components:
  - ../../../components/postgres-self-hosted
  - ../../../components/redis-self-hosted

images:
  - name: BACKEND_IMAGE
    newName: YOUR_ACR.azurecr.io/connectk-backend
    newTag: latest
  - name: FRONTEND_IMAGE
    newName: YOUR_ACR.azurecr.io/connectk-frontend
    newTag: latest
